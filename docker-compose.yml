services:

  # ── PHP / Laravel ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mm_app
    restart: unless-stopped
    working_dir: /var/www/memories-map/backend
    volumes:
      - ./backend:/var/www/memories-map/backend
      - media_data:/var/memories-map/media
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:5173
      DB_HOST: db
      DB_DATABASE: memories_map
      DB_USERNAME: memories_map_user
      DB_PASSWORD: secret
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: noreply@localhost
      MAIL_FROM_NAME: Memories Map
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mm_net

  queue_worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mm_queue_worker
    restart: unless-stopped
    working_dir: /var/www/memories-map/backend
    command: >
      sh -c "php artisan queue:work --queue=media-processing,default --tries=5 --timeout=240 --sleep=2 --backoff=10"
    volumes:
      - ./backend:/var/www/memories-map/backend
      - media_data:/var/memories-map/media
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:5173
      DB_HOST: db
      DB_DATABASE: memories_map
      DB_USERNAME: memories_map_user
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      MEDIA_PROCESSING_QUEUE: media-processing
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mm_net

  # ── Nginx (local dev proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mm_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/memories-map/backend/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - mm_net

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: mm_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: memories_map
      MYSQL_USER: memories_map_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "memories_map_user", "-psecret" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mm_net

  # ── Frontend dev server ────────────────────────────────────────────────────
  frontend:
    image: node:24-alpine
    container_name: mm_frontend
    working_dir: /app
    command: sh -c "npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_DEV_PROXY_TARGET: http://nginx
    networks:
      - mm_net

volumes:
  db_data:
  media_data:
  frontend_node_modules:

networks:
  mm_net:
    driver: bridge
