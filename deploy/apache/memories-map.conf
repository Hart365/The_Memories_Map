<VirtualHost *:80>
    ServerName your-domain.com
    Redirect permanent / https://your-domain.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName your-domain.com
    DocumentRoot /var/www/memories-map/backend/public

    # ── TLS ──────────────────────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/your-domain.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/your-domain.com/privkey.pem

    # Modern TLS only
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # ── Security headers ──────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self'; font-src 'self'; frame-ancestors 'none';"

    # ── Laravel document root ─────────────────────────────────────────────────
    <Directory /var/www/memories-map/backend/public>
        AllowOverride All
        Require all granted
        Options -Indexes -ExecCGI

        # Laravel front-controller
        FallbackResource /index.php
    </Directory>

    # ── Block direct access to sensitive files ────────────────────────────────
    <FilesMatch "(\.env|composer\.(json|lock)|artisan|\.git)">
        Require all denied
    </FilesMatch>

    # ── Media storage is OUTSIDE web root – never served directly ─────────────
    # /var/memories-map/media is not under DocumentRoot, so no rule needed.

    # ── PHP-FPM proxy ─────────────────────────────────────────────────────────
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/memories-map-error.log
    CustomLog ${APACHE_LOG_DIR}/memories-map-access.log combined
</VirtualHost>
